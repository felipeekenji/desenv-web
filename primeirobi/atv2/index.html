<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <header>
        <h1>Cadastro</h1>
    </header>

    <form>

        <fieldset>
            <legend>Crie sua Conta</legend>

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome"><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="seuemail@dominio.com" required><br><br>

            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" minlength="8" required><br><br>
            
            <strong>Gênero</strong><br>

            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label><br>

            <input type="radio" id="feminino" name="genero" value="feminino">
            <label for="feminino">Feminino</label><br>

            <input type="radio" id="outro" name="genero" value="outro">
            <label for="outro">Outro</label><br><br>
            
            <label for="biografia">Biografia:</label><br>
            <textarea id="biografia" name="biografia" rows="4" placeholder="Escreva um pouco sobre você..."></textarea><br><br>

            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Eu concordo com os termos de uso</label><br><br>
        
        </fieldset><br>
            
        <button type="submit">Cadastrar-se</button>
        <button type="reset">Limpar</button>
            
    </form>
</body>
</html>
